<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BlitzKode - AI Coding Assistant by Sajad">
    <title>BlitzKode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2310a37f' rx='12' width='100' height='100'/><text y='.9em' x='50%25' text-anchor='middle' font-size='70'>&amp;#9889;</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-2: #111111;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --text: #ffffff;
            --text-2: #888888;
            --text-3: #555555;
            --accent: #10a37f;
            --accent-hover: #1a7f5a;
            --code-bg: #0d0d0d;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app { display: flex; height: 100%; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        .sidebar-overlay.active { display: block; }

        .new-chat-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 10px;
            font-family: inherit;
            width: 100%;
        }
        .new-chat-btn:hover { background: var(--border); border-color: var(--border-light); }
        .new-chat-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }

        .logo-container {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .logo-grid {
            width: 16px; height: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1px;
        }
        .logo-grid span { background: white; border-radius: 1px; }
        .logo-grid span:nth-child(5) { background: transparent; }

        .brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

        .sidebar-section {
            padding: 8px 0;
            border-top: 1px solid var(--border);
        }
        .sidebar-section-title {
            font-size: 11px;
            color: var(--text-3);
            padding: 4px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
        }
        .settings-label { font-size: 12px; color: var(--text-2); }
        .settings-value { font-size: 12px; color: var(--text); min-width: 30px; text-align: right; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px;
        }
        .user-avatar {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0;
        }
        .user-name { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-badge { font-size: 11px; background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 500; flex-shrink: 0; }

        .main {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
        }

        .menu-toggle {
            display: none;
            background: var(--surface);
            border: none; color: var(--text); padding: 8px;
            cursor: pointer; border-radius: 8px;
        }
        .menu-toggle svg { width: 24px; height: 24px; }

        .top-bar {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .model-name { font-size: 14px; font-weight: 500; color: var(--text); }

        .model-status { font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .model-status.offline { color: #ef4444; }
        .model-status.offline .status-dot { background: #ef4444; animation: none; }
        .status-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .chat { flex: 1; overflow-y: auto; padding: 20px; }

        .message { max-width: 720px; margin: 0 auto 24px; animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .message-label { font-size: 13px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; color: var(--text-2); }
        .message.assistant .message-label { color: var(--accent); }

        .message-content { line-height: 1.7; font-size: 15px; word-wrap: break-word; }

        .message.user .message-content {
            background: #1e3a2f; color: #e8f5f0;
            padding: 12px 16px; border-radius: 18px 18px 4px 18px;
            display: inline-block; border: 1px solid #2a4a40;
            max-width: 100%; word-wrap: break-word;
        }

        .message-content pre {
            background: var(--code-bg); border: 1px solid var(--border-light);
            border-radius: 10px; padding: 16px; margin: 14px 0;
            overflow-x: auto; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; line-height: 1.6; position: relative;
        }

        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: var(--surface-2); border: 1px solid var(--border-light);
            color: var(--text-2); padding: 4px 10px; border-radius: 6px;
            font-size: 11px; cursor: pointer; font-family: inherit;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--border-light); color: var(--text); }

        .message-content code { color: #e5e5e5; }
        .message-content p code {
            background: var(--surface-2); padding: 2px 6px; border-radius: 4px;
            font-size: 13px; font-family: 'JetBrains Mono', monospace;
        }
        .message-content p { margin: 8px 0; }
        .message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
        .message-content li { margin: 4px 0; }
        .message-content strong { font-weight: 600; }
        .message-content h1, .message-content h2, .message-content h3 { margin: 12px 0 6px; font-weight: 600; }
        .message-content h1 { font-size: 20px; }
        .message-content h2 { font-size: 17px; }
        .message-content h3 { font-size: 15px; }

        .input-wrap { padding: 16px 20px 24px; background: var(--bg); border-top: 1px solid var(--border); }

        .input-container {
            max-width: 720px; margin: 0 auto;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px 16px;
            display: flex; gap: 10px; align-items: flex-end;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-container:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1); }

        #prompt {
            flex: 1; background: transparent; border: none; color: var(--text);
            font-family: inherit; font-size: 15px; resize: none;
            min-height: 24px; max-height: 200px; line-height: 1.5;
            outline: none; width: 100%;
        }
        #prompt::placeholder { color: var(--text-3); }

        #send-btn {
            background: var(--accent); border: none; border-radius: 8px;
            padding: 8px 16px; color: white; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            font-family: inherit; flex-shrink: 0;
        }
        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:active { transform: scale(0.98); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }

        .empty-logo {
            width: 72px; height: 72px; background: var(--accent);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
        }
        .empty-logo .logo-grid { width: 32px; height: 32px; }
        .empty-logo .logo-grid span { border-radius: 2px; }
        .empty h1 { font-size: 26px; font-weight: 500; margin-bottom: 10px; letter-spacing: -0.5px; }
        .empty p { color: var(--text-2); font-size: 14px; max-width: 320px; text-align: center; line-height: 1.6; }

        .loading { display: inline-flex; gap: 3px; padding: 4px; }
        .loading span { width: 4px; height: 4px; background: var(--text-3); border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
        .loading span:nth-child(2) { animation-delay: 0.16s; }
        .loading span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

        .cursor-blink { display: inline-block; width: 2px; height: 1em; background: var(--accent); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main { margin-left: 0; }
            .menu-toggle { display: flex; }
            .top-bar { padding: 12px 16px; }
            .chat { padding: 16px; }
            .input-wrap { padding: 12px 16px 20px; }
            .message { margin-bottom: 16px; }
            .message-content { font-size: 14px; }
            .message.user .message-content { padding: 10px 14px; }
            .empty h1 { font-size: 22px; }
            .empty p { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <button class="new-chat-btn" onclick="newChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                New Chat
            </button>
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-grid">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <span class="brand-name">BlitzKode</span>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Settings</div>
                <div class="settings-row">
                    <span class="settings-label">Temperature</span>
                    <span class="settings-value" id="tempVal">0.5</span>
                </div>
                <div style="padding: 2px 12px;">
                    <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.5" oninput="updateTemp(this.value)">
                </div>
                <div class="settings-row">
                    <span class="settings-label">Max Tokens</span>
                    <span class="settings-value" id="tokensVal">256</span>
                </div>
                <div style="padding: 2px 12px;">
                    <input type="range" id="tokensSlider" min="64" max="512" step="64" value="256" oninput="updateTokens(this.value)">
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">S</div>
                    <span class="user-name">Created by Sajad</span>
                    <span class="model-badge">v2.0</span>
                </div>
            </div>
        </aside>

        <main class="main" id="main">
            <div class="top-bar">
                <div class="top-bar-left">
                    <button class="menu-toggle" onclick="openSidebar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                    <span class="model-name">BlitzKode</span>
                </div>
                <span class="model-status" id="modelStatus"><span class="status-dot"></span> Checking</span>
            </div>
            <div class="chat" id="chat">
                <div class="empty" id="empty">
                    <div class="empty-logo">
                        <div class="logo-grid">
                            <span></span><span></span><span></span>
                            <span></span><span></span><span></span>
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <h1>BlitzKode</h1>
                    <p>Your AI coding assistant built by Sajad. Write code, debug, and learn programming.</p>
                </div>
            </div>

            <div class="input-wrap">
                <div class="input-container">
                    <textarea id="prompt" placeholder="Message BlitzKode (Shift+Enter for new line)" rows="1"></textarea>
                    <button id="send-btn" onclick="send()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        var chat = document.getElementById('chat');
        var promptInput = document.getElementById('prompt');
        var sendBtn = document.getElementById('send-btn');
        var emptyEl = document.getElementById('empty');
        var sidebar = document.getElementById('sidebar');
        var sidebarOverlay = document.getElementById('sidebarOverlay');
        var modelStatus = document.getElementById('modelStatus');

        var conversationHistory = [];
        var temperature = 0.5;
        var maxTokens = 256;
        var isSending = false;

        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return code;
                },
                breaks: true,
                gfm: true,
            });
        }

        function updateTemp(val) {
            temperature = parseFloat(val);
            document.getElementById('tempVal').textContent = val;
        }

        function updateTokens(val) {
            maxTokens = parseInt(val);
            document.getElementById('tokensVal').textContent = val;
        }

        async function refreshStatus() {
            try {
                var res = await fetch('/health');
                if (!res.ok) throw new Error('failed');
                var data = await res.json();
                if (data.status === 'healthy' && data.model_exists) {
                    modelStatus.classList.remove('offline');
                    modelStatus.innerHTML = '<span class="status-dot"></span> Ready';
                } else {
                    modelStatus.classList.add('offline');
                    modelStatus.innerHTML = '<span class="status-dot"></span> Model missing';
                }
            } catch (e) {
                modelStatus.classList.add('offline');
                modelStatus.innerHTML = '<span class="status-dot"></span> Unavailable';
            }
        }

        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        function saveChat() {
            try {
                localStorage.setItem('blitzkode_chat', chat.innerHTML);
                localStorage.setItem('blitzkode_history', JSON.stringify(conversationHistory));
            } catch (e) {}
        }

        function loadChat() {
            try {
                var saved = localStorage.getItem('blitzkode_chat');
                var history = localStorage.getItem('blitzkode_history');
                if (saved && saved.indexOf('message') !== -1) {
                    chat.innerHTML = saved;
                    if (history) conversationHistory = JSON.parse(history);
                    addCopyButtons();
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function newChat() {
            conversationHistory = [];
            chat.innerHTML = '';
            var clone = emptyEl.cloneNode(true);
            clone.style.display = '';
            chat.appendChild(clone);
            localStorage.removeItem('blitzkode_chat');
            localStorage.removeItem('blitzkode_history');
            promptInput.value = '';
            promptInput.style.height = 'auto';
            promptInput.focus();
            closeSidebar();
        }

        promptInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        promptInput.addEventListener('input', function() {
            promptInput.style.height = 'auto';
            promptInput.style.height = Math.min(promptInput.scrollHeight, 200) + 'px';
        });

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                try { return marked.parse(text); } catch (e) {}
            }
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        function addCopyButton(preEl) {
            var btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = 'Copy';
            btn.onclick = function() {
                var code = preEl.querySelector('code');
                var text = code ? code.textContent : preEl.textContent;
                navigator.clipboard.writeText(text).then(function() {
                    btn.textContent = 'Copied';
                    setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
                });
            };
            preEl.style.position = 'relative';
            preEl.appendChild(btn);
        }

        function addCopyButtons() {
            var pres = chat.querySelectorAll('pre');
            for (var i = 0; i < pres.length; i++) {
                if (!pres[i].querySelector('.copy-btn')) addCopyButton(pres[i]);
            }
        }

        function addMessage(role, content) {
            if (emptyEl && emptyEl.parentNode) emptyEl.parentNode.removeChild(emptyEl);

            var div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML =
                '<div class="message-label">' + (role === 'user' ? 'You' : 'BlitzKode') + '</div>' +
                '<div class="message-content">' + (role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : renderMarkdown(content)) + '</div>';
            chat.appendChild(div);

            if (role === 'assistant') addCopyButtons();
            chat.scrollTop = chat.scrollHeight;
            saveChat();
        }

        function updateAssistantContent(contentEl, text, isStreaming) {
            contentEl.innerHTML = renderMarkdown(text);
            if (isStreaming) {
                var cursor = document.createElement('span');
                cursor.className = 'cursor-blink';
                contentEl.appendChild(cursor);
            }
            addCopyButtons();
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            if (isSending) return;

            var prompt = promptInput.value.trim();
            if (!prompt) return;

            isSending = true;
            conversationHistory.push({ role: 'user', content: prompt });
            addMessage('user', prompt);
            promptInput.value = '';
            promptInput.style.height = 'auto';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"><span></span><span></span><span></span></span>';

            if (emptyEl && emptyEl.parentNode) emptyEl.parentNode.removeChild(emptyEl);

            var assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant';
            assistantDiv.innerHTML =
                '<div class="message-label">BlitzKode</div>' +
                '<div class="message-content"><span class="loading"><span></span><span></span><span></span></span></div>';
            chat.appendChild(assistantDiv);

            var contentEl = assistantDiv.querySelector('.message-content');
            var fullText = '';

            try {
                var res = await fetch('/generate/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        messages: conversationHistory.slice(-8),
                        temperature: temperature,
                        max_tokens: maxTokens,
                    }),
                });

                if (!res.ok) {
                    var errData = null;
                    try { errData = await res.json(); } catch (e) {}
                    throw new Error(errData && errData.error ? errData.error : 'Server error: ' + res.status);
                }

                var contentType = res.headers.get('content-type') || '';

                if (contentType.indexOf('text/event-stream') !== -1) {
                    var reader = res.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = '';

                    while (true) {
                        var result = await reader.read();
                        if (result.done) break;

                        buffer += decoder.decode(result.value, { stream: true });
                        var lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i].trim();
                            if (!line || !line.startsWith('data: ')) continue;

                            var data = line.slice(6);
                            if (data === '[DONE]') break;

                            try {
                                var parsed = JSON.parse(data);
                                if (parsed.token) {
                                    fullText += parsed.token;
                                    updateAssistantContent(contentEl, fullText, true);
                                } else if (parsed.error) {
                                    throw new Error(parsed.error);
                                }
                            } catch (e) {
                                if (e.message && e.message.indexOf('JSON') === -1) throw e;
                            }
                        }
                    }
                } else {
                    var data = await res.json();
                    if (data.error) throw new Error(data.error);
                    fullText = data.response || '';
                }

                updateAssistantContent(contentEl, fullText, false);
                conversationHistory.push({ role: 'assistant', content: fullText });
                saveChat();

            } catch (e) {
                contentEl.innerHTML = '<p style="color: #ef4444;">Error: ' + escapeHtml(e.message) + '</p>';
                conversationHistory.pop();
                refreshStatus();
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            chat.scrollTop = chat.scrollHeight;
            isSending = false;
        }

        if (!loadChat()) {
            refreshStatus();
        } else {
            refreshStatus();
        }
    </script>
</body>
</html>
